<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой гардероб - Wardrobe Advisor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/wardrobe.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>👗 Wardrobe Advisor</h1>
            <p>Мой гардероб</p>
        </header>

        <main class="main-content">
            <div class="page-header">
                <h1>Мой гардероб</h1>
            </div>

            <div class="wardrobe-grid">
                {% for item in items %}
                <div class="clothing-card">
                    <h3 class="item-name">{{ item.name }}</h3>
                    <div class="item-info">
                        <div class="category">Категория: {{ item.category }}</div>
                        <div class="warmth">Теплозащита: {{ item.warmth }}</div>
                        {% if item.waterproof %}
                        <div class="waterproof">Водоустойчивость: 🌂</div>
                        {% endif %}
                    </div>
                </div>
                {% endfor %}
            </div>

            <div class="back-button">
                <a href="/" class="btn">← Назад на главную</a>
            </div>
        </main>

        <footer class="footer">
            <p>© 2026 Wardrobe Advisor. Все права защищены.</p>
        </footer>
    </div>
</body>
</html>
