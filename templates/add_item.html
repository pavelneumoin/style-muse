<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить вещь - Style Muse ✨</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/form.css') }}">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <span class="logo-icon">👗</span>
                <h1>Style Muse</h1>
            </a>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link">Главная</a></li>
                <li><a href="/wardrobe" class="nav-link">Мой гардероб</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <header class="header" style="padding-bottom: 0;">
            <h1>Style Muse</h1>
            <p>Добавить новую вещь</p>
        </header>

        <main class="main-content">
            <form method="POST" class="item-form">
                <div class="form-card">
                    <div class="form-field">
                        <label for="name">Название *</label>
                        <input type="text" id="name" name="name" placeholder="Например: Розовое платье" required>
                    </div>

                    <div class="form-field">
                        <label for="category">Категория *</label>
                        <select id="category" name="category" required>
                            <option value="">Выбери категорию</option>
                            <option value="Верх">👚 Верх (блузки, топы)</option>
                            <option value="Низ">👖 Низ (юбки, брюки)</option>
                            <option value="Платья">👗 Платья</option>
                            <option value="Верхняя одежда">🧥 Верхняя одежда</option>
                            <option value="Обувь">👠 Обувь</option>
                            <option value="Головной убор">🎀 Головной убор</option>
                            <option value="Аксессуар">💍 Аксессуары</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label>Цвет <small>(оставьте пустым для случайного)</small></label>
                        <input type="hidden" id="color" name="color" value="">
                        <div class="color-palette">
                            {% for color in colors %}
                            <button type="button" class="color-swatch-btn" data-hex="{{ color.hex }}"
                                data-name="{{ color.name }}" style="background: {{ color.hex }};"
                                title="{{ color.name }}">
                            </button>
                            {% endfor %}
                        </div>
                        <div class="selected-color-info">
                            <span id="selected-color-preview" class="color-preview"></span>
                            <span id="selected-color-name">Случайный цвет 🎲</span>
                            <button type="button" id="random-color-btn" class="btn btn-small">🎲 Случайный</button>
                        </div>
                    </div>

                    <div class="form-field">
                        <label>Теплозащита *</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="warmth" value="Лёгкий" required>
                                <span class="radio-custom"></span>
                                <span>☀️ Лёгкий</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="warmth" value="Средний">
                                <span class="radio-custom"></span>
                                <span>🌤️ Средний</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="warmth" value="Тёплый">
                                <span class="radio-custom"></span>
                                <span>❄️ Тёплый</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-field">
                        <label class="checkbox-label">
                            <input type="checkbox" name="waterproof">
                            <span class="checkbox-custom"></span>
                            <span>☂️ Водоустойчивая</span>
                        </label>
                    </div>

                    <div class="form-field">
                        <label>Сезонность</label>
                        <div class="checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" name="лето">
                                <span class="checkbox-custom"></span>
                                <span>☀️ Лето</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="осень">
                                <span class="checkbox-custom"></span>
                                <span>🍂 Осень</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="зима">
                                <span class="checkbox-custom"></span>
                                <span>❄️ Зима</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="весна">
                                <span class="checkbox-custom"></span>
                                <span>🌸 Весна</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="межсезонье">
                                <span class="checkbox-custom"></span>
                                <span>🌧️ Межсезонье</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a href="/wardrobe" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-primary">✨ Сохранить</button>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <footer>
        <p>✨ Style Muse — твой персональный стилист © 2026</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const colorInput = document.getElementById('color');
            const colorPreview = document.getElementById('selected-color-preview');
            const colorName = document.getElementById('selected-color-name');
            const swatches = document.querySelectorAll('.color-swatch-btn');
            const randomBtn = document.getElementById('random-color-btn');

            // Обработка клика по цвету
            swatches.forEach(swatch => {
                swatch.addEventListener('click', function () {
                    // Убираем выделение со всех
                    swatches.forEach(s => s.classList.remove('selected'));
                    // Выделяем текущий
                    this.classList.add('selected');
                    // Обновляем значения
                    const hex = this.dataset.hex;
                    const name = this.dataset.name;
                    colorInput.value = hex;
                    colorPreview.style.background = hex;
                    colorName.textContent = name;
                });
            });

            // Случайный цвет
            randomBtn.addEventListener('click', function () {
                swatches.forEach(s => s.classList.remove('selected'));
                colorInput.value = '';
                colorPreview.style.background = '';
                colorName.textContent = 'Случайный цвет 🎲';
            });
        });
    </script>
</body>

</html>
