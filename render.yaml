services:
  - type: web
    name: detsky-pogodnik
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: YANDEX_FOLDER_ID
        sync: false
      - key: YANDEX_API_KEY
        sync: false
